openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: overview
    description: Organization-wide observability summary
  - name: departments
    description: Department-level attribution and drill-down
  - name: employees
    description: Employee-level attribution and drill-down
  - name: models
    description: Model usage and cost breakdown
  - name: agents
    description: Agent inventory with attribution
  - name: budgets
    description: Per-department (and optional per-model) monthly spend budgets
  - name: traces
    description: Live agent/LLM execution traces pulled from Datadog LLM Observability
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /overview:
    get:
      operationId: getOverview
      tags: [overview]
      summary: Organization observability summary
      description: Totals for cost and tokens across the whole organization, plus headline counts.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Overview summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Overview"
  /overview/trends:
    get:
      operationId: getTrends
      tags: [overview]
      summary: Cost and token trends over time
      description: Daily time series of cost and token usage across the organization.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Daily trend points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: Department breakdown
      description: Cost, token usage, and counts grouped by department.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Departments with aggregates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentSummary"
  /departments/{departmentId}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Department detail
      description: A single department with its employees and usage aggregates.
      parameters:
        - name: departmentId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Department detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: Employee breakdown
      description: Cost, token usage, and agent counts grouped by employee.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Employees with aggregates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeSummary"
  /employees/{employeeId}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Employee detail
      description: A single employee with the agents they launched and usage aggregates.
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Employee detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /models:
    get:
      operationId: listModels
      tags: [models]
      summary: Model breakdown
      description: Cost, token usage, and agent counts grouped by model, including per-model pricing.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Models with aggregates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelSummary"
  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: Agent inventory
      description: All agents with full attribution (employee, department, model) and usage.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Agents with attribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
  /agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Agent detail
      description: A single agent with attribution, usage aggregates, and recent activity.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /budgets:
    get:
      operationId: listBudgets
      tags: [budgets]
      summary: List budgets
      description: >-
        All configured monthly budgets with current-month actual spend,
        utilization, and over/near-budget status.
      responses:
        "200":
          description: Budgets with actual-vs-budget calculation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Budget"
    put:
      operationId: setBudget
      tags: [budgets]
      summary: Create or update a budget
      description: >-
        Upserts a monthly budget for a department, optionally scoped to a single
        model. A department-wide budget uses a null modelId.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetInput"
      responses:
        "200":
          description: The saved budget with actual-vs-budget calculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Department or model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /budgets/{budgetId}:
    delete:
      operationId: deleteBudget
      tags: [budgets]
      summary: Delete a budget
      description: Removes a configured budget.
      parameters:
        - name: budgetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tiers:
    get:
      operationId: listTiers
      tags: [tiers]
      summary: Access tier breakdown
      description: >-
        Spend, token usage, model membership, and access governance grouped by
        model access tier (frontier, research, routine).
      responses:
        "200":
          description: Tiers with aggregates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TierSummary"
  /traces:
    get:
      operationId: listTraces
      tags: [traces]
      summary: List agent/LLM execution spans
      description: >-
        Recent agent/model spans pulled live from Datadog LLM Observability,
        scoped to the reporting window and optionally filtered by span kind and a
        free-text query. When the org has no LLM Obs data yet, `noData` is true
        and `spans` is empty (not an error).
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
        - $ref: "#/components/parameters/SpanKind"
        - $ref: "#/components/parameters/TraceQuery"
      responses:
        "200":
          description: Matching spans (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceList"
  /traces/summary:
    get:
      operationId: getTraceSummary
      tags: [traces]
      summary: Aggregate totals for the matching spans
      description: >-
        Span count, error count, token totals, and average latency for the spans
        matching the same window and filters as the trace list.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
        - $ref: "#/components/parameters/SpanKind"
        - $ref: "#/components/parameters/TraceQuery"
      responses:
        "200":
          description: Aggregate trace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceSummary"
components:
  parameters:
    FromDate:
      name: from
      in: query
      required: false
      description: >-
        Inclusive start of the reporting window as an ISO date (YYYY-MM-DD).
        When omitted, aggregation starts from the earliest usage event.
      schema:
        type: string
        format: date
    ToDate:
      name: to
      in: query
      required: false
      description: >-
        Inclusive end of the reporting window as an ISO date (YYYY-MM-DD).
        Events on this day are included. When omitted, aggregation runs to the
        latest usage event.
      schema:
        type: string
        format: date
    SpanKind:
      name: kind
      in: query
      required: false
      description: >-
        Restrict to a single LLM Obs span kind (e.g. llm, agent, workflow, tool,
        task, embedding, retrieval). When omitted, all kinds are returned.
      schema:
        type: string
    TraceQuery:
      name: q
      in: query
      required: false
      description: >-
        Free-text filter matched against span name, model, provider, kind, and
        ml_app.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Overview:
      type: object
      required:
        - totalCost
        - totalTokens
        - totalInputTokens
        - totalOutputTokens
        - agentCount
        - activeAgentCount
        - employeeCount
        - departmentCount
        - modelCount
        - runCount
        - avgCostPerAgent
        - topDepartment
        - topModel
      properties:
        totalCost:
          type: number
          description: Total spend in USD across all usage
        totalTokens:
          type: integer
        totalInputTokens:
          type: integer
        totalOutputTokens:
          type: integer
        agentCount:
          type: integer
        activeAgentCount:
          type: integer
        employeeCount:
          type: integer
        departmentCount:
          type: integer
        modelCount:
          type: integer
        runCount:
          type: integer
        avgCostPerAgent:
          type: number
        topDepartment:
          type: ["string", "null"]
        topModel:
          type: ["string", "null"]
    TrendPoint:
      type: object
      required:
        - date
        - cost
        - tokens
      properties:
        date:
          type: string
          description: ISO date (YYYY-MM-DD)
        cost:
          type: number
        tokens:
          type: integer
    DepartmentSummary:
      type: object
      required:
        - id
        - name
        - cost
        - tokens
        - inputTokens
        - outputTokens
        - agentCount
        - employeeCount
        - runCount
        - costShare
      properties:
        id:
          type: string
        name:
          type: string
        cost:
          type: number
        tokens:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        agentCount:
          type: integer
        employeeCount:
          type: integer
        runCount:
          type: integer
        costShare:
          type: number
          description: Fraction of total org cost (0-1)
        budget:
          oneOf:
            - $ref: "#/components/schemas/DepartmentBudgetStatus"
            - type: "null"
          description: >-
            Department-wide monthly budget status, or null when no budget is set.
    DepartmentDetail:
      type: object
      required:
        - id
        - name
        - cost
        - tokens
        - inputTokens
        - outputTokens
        - agentCount
        - employeeCount
        - runCount
        - costShare
        - employees
        - modelBreakdown
      properties:
        id:
          type: string
        name:
          type: string
        cost:
          type: number
        tokens:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        agentCount:
          type: integer
        employeeCount:
          type: integer
        runCount:
          type: integer
        costShare:
          type: number
        employees:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeSummary"
        modelBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsage"
        budget:
          oneOf:
            - $ref: "#/components/schemas/DepartmentBudgetStatus"
            - type: "null"
          description: >-
            Department-wide monthly budget status, or null when no budget is set.
        modelBudgets:
          type: array
          description: Per-model budgets configured for this department, with status.
          items:
            $ref: "#/components/schemas/Budget"
    EmployeeSummary:
      type: object
      required:
        - id
        - name
        - role
        - accessTier
        - departmentId
        - departmentName
        - cost
        - tokens
        - inputTokens
        - outputTokens
        - agentCount
        - runCount
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        accessTier:
          type: string
          description: Highest model tier granted (frontier, research, routine)
        departmentId:
          type: string
        departmentName:
          type: string
        cost:
          type: number
        tokens:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        agentCount:
          type: integer
        runCount:
          type: integer
    EmployeeDetail:
      type: object
      required:
        - id
        - name
        - role
        - accessTier
        - departmentId
        - departmentName
        - cost
        - tokens
        - inputTokens
        - outputTokens
        - agentCount
        - runCount
        - agents
        - modelBreakdown
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        accessTier:
          type: string
          description: Highest model tier granted (frontier, research, routine)
        departmentId:
          type: string
        departmentName:
          type: string
        cost:
          type: number
        tokens:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        agentCount:
          type: integer
        runCount:
          type: integer
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        modelBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsage"
    ModelSummary:
      type: object
      required:
        - id
        - name
        - provider
        - tier
        - inputPricePerMillion
        - outputPricePerMillion
        - cost
        - tokens
        - inputTokens
        - outputTokens
        - agentCount
        - runCount
        - costShare
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        tier:
          type: string
          description: Access tier (frontier, research, routine)
        inputPricePerMillion:
          type: number
          description: USD per 1M input tokens
        outputPricePerMillion:
          type: number
          description: USD per 1M output tokens
        cost:
          type: number
        tokens:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        agentCount:
          type: integer
        runCount:
          type: integer
        costShare:
          type: number
    ModelUsage:
      type: object
      required:
        - modelId
        - modelName
        - provider
        - tier
        - cost
        - tokens
      properties:
        modelId:
          type: string
        modelName:
          type: string
        provider:
          type: string
        tier:
          type: string
          description: Access tier (frontier, research, routine)
        cost:
          type: number
        tokens:
          type: integer
    Agent:
      type: object
      required:
        - id
        - name
        - purpose
        - status
        - employeeId
        - employeeName
        - departmentId
        - departmentName
        - modelId
        - modelName
        - provider
        - modelTier
        - cost
        - tokens
        - inputTokens
        - outputTokens
        - runCount
        - createdAt
        - lastActiveAt
      properties:
        id:
          type: string
        name:
          type: string
        purpose:
          type: string
        status:
          type: string
          description: One of active, idle, archived
        employeeId:
          type: string
        employeeName:
          type: string
        departmentId:
          type: string
        departmentName:
          type: string
        modelId:
          type: string
        modelName:
          type: string
        provider:
          type: string
        modelTier:
          type: string
          description: Access tier of the agent's model (frontier, research, routine)
        cost:
          type: number
        tokens:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        runCount:
          type: integer
        createdAt:
          type: string
        lastActiveAt:
          type: string
    AgentDetail:
      type: object
      required:
        - id
        - name
        - purpose
        - status
        - employeeId
        - employeeName
        - departmentId
        - departmentName
        - modelId
        - modelName
        - provider
        - modelTier
        - cost
        - tokens
        - inputTokens
        - outputTokens
        - runCount
        - createdAt
        - lastActiveAt
        - trends
        - recentRuns
      properties:
        id:
          type: string
        name:
          type: string
        purpose:
          type: string
        status:
          type: string
        employeeId:
          type: string
        employeeName:
          type: string
        departmentId:
          type: string
        departmentName:
          type: string
        modelId:
          type: string
        modelName:
          type: string
        provider:
          type: string
        modelTier:
          type: string
          description: Access tier of the agent's model (frontier, research, routine)
        cost:
          type: number
        tokens:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        runCount:
          type: integer
        createdAt:
          type: string
        lastActiveAt:
          type: string
        trends:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        recentRuns:
          type: array
          items:
            $ref: "#/components/schemas/AgentRun"
    AgentRun:
      type: object
      required:
        - id
        - timestamp
        - inputTokens
        - outputTokens
        - tokens
        - cost
      properties:
        id:
          type: string
        timestamp:
          type: string
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        tokens:
          type: integer
        cost:
          type: number
    TierSummary:
      type: object
      required:
        - tier
        - label
        - cost
        - tokens
        - inputTokens
        - outputTokens
        - costShare
        - agentCount
        - employeeCount
        - modelCount
        - runCount
        - models
      properties:
        tier:
          type: string
          description: Tier id (frontier, research, routine)
        label:
          type: string
          description: Human-readable tier name
        cost:
          type: number
          description: Spend on models in this tier
        tokens:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        costShare:
          type: number
          description: Fraction of total org cost in this tier (0-1)
        agentCount:
          type: integer
          description: Agents whose model is in this tier
        employeeCount:
          type: integer
          description: Employees whose granted access tier equals this tier
        modelCount:
          type: integer
        runCount:
          type: integer
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelUsage"
    DepartmentBudgetStatus:
      type: object
      required:
        - id
        - amount
        - spend
        - utilization
        - status
        - period
      properties:
        id:
          type: integer
          description: Budget record id
        amount:
          type: number
          description: Monthly budget cap in USD
        spend:
          type: number
          description: Actual spend in the current calendar month (USD)
        utilization:
          type: number
          description: spend / amount (0-1+, can exceed 1 when over budget)
        status:
          type: string
          description: One of ok, warning (near budget), over (exceeded)
        period:
          type: string
          description: Calendar month the spend covers (YYYY-MM)
    Budget:
      type: object
      required:
        - id
        - departmentId
        - departmentName
        - modelId
        - modelName
        - amount
        - spend
        - utilization
        - status
        - period
      properties:
        id:
          type: integer
        departmentId:
          type: string
        departmentName:
          type: string
        modelId:
          type: ["string", "null"]
          description: Model scope, or null for a department-wide budget
        modelName:
          type: ["string", "null"]
        amount:
          type: number
          description: Monthly budget cap in USD
        spend:
          type: number
          description: Actual spend in the current calendar month (USD)
        utilization:
          type: number
          description: spend / amount (0-1+, can exceed 1 when over budget)
        status:
          type: string
          description: One of ok, warning (near budget), over (exceeded)
        period:
          type: string
          description: Calendar month the spend covers (YYYY-MM)
    BudgetInput:
      type: object
      required:
        - departmentId
        - amount
      properties:
        departmentId:
          type: string
        modelId:
          type: ["string", "null"]
          description: Optional model scope; omit or null for a department-wide budget
        amount:
          type: number
          description: Monthly budget cap in USD (must be greater than 0)
    TraceSpan:
      type: object
      required:
        - spanId
        - traceId
        - name
        - kind
        - model
        - provider
        - inputTokens
        - outputTokens
        - totalTokens
        - latencyMs
        - status
        - timestamp
        - mlApp
        - tags
      properties:
        spanId:
          type: string
        traceId:
          type: string
        parentId:
          type: ["string", "null"]
        name:
          type: string
        kind:
          type: string
          description: LLM Obs span kind (llm, agent, workflow, tool, task, etc.)
        model:
          type: ["string", "null"]
        provider:
          type: ["string", "null"]
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        totalTokens:
          type: integer
        latencyMs:
          type: number
          description: Span duration in milliseconds
        status:
          type: string
          description: ok or error
        timestamp:
          type: string
          description: Span start time as an ISO 8601 timestamp
        mlApp:
          type: ["string", "null"]
          description: Datadog ml_app the span was emitted under
        tags:
          type: array
          items:
            type: string
    TraceList:
      type: object
      required:
        - noData
        - spans
      properties:
        noData:
          type: boolean
          description: True when Datadog has no LLM Obs data yet (empty, not an error)
        spans:
          type: array
          items:
            $ref: "#/components/schemas/TraceSpan"
    TraceSummary:
      type: object
      required:
        - noData
        - spanCount
        - errorCount
        - inputTokens
        - outputTokens
        - totalTokens
        - avgLatencyMs
      properties:
        noData:
          type: boolean
          description: True when Datadog has no LLM Obs data yet (empty, not an error)
        spanCount:
          type: integer
        errorCount:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        totalTokens:
          type: integer
        avgLatencyMs:
          type: number
          description: Mean span latency in milliseconds across matching spans
